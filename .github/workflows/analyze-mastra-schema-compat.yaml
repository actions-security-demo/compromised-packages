name: Analyze @mastra/schema-compat Compromised Package

on:
  workflow_dispatch:

permissions: read-all

jobs:
  download-package:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download compromised and clean tarballs
        run: |
          mkdir -p /tmp/packages
          cd /tmp/packages
          npm pack @mastra/schema-compat@1.2.12 || true
          npm pack @mastra/schema-compat@1.2.11 || true

      - name: Upload package tarballs
        uses: actions/upload-artifact@v4
        with:
          name: mastra-schema-compat-tarballs
          path: /tmp/packages/*.tgz
          retention-days: 90

  install-compromised-package:
    runs-on: ubuntu-latest
    needs: download-package
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install compromised package
        continue-on-error: true
        env:
          BUN_CONFIG_VERBOSE_FETCH: "true"
          GITHUB_ACTION_REF: refs/heads/main
          GITHUB_ACTION_REPOSITORY: xyz/xyz
          GITHUB_REF: refs/heads/main
          GITHUB_REPOSITORY: xyz/xyz
          GITHUB_WORKFLOW_REF: xyz/xyz/.github/workflows/analyze-mastra-schema-compat.yaml@refs/heads/main
        run: |
          mkdir -p /tmp/victim-project && cd /tmp/victim-project
          npm init -y
          npm install @mastra/schema-compat@1.2.12 2>&1 || true

      - name: Inspect malicious dependency easy-day-js
        continue-on-error: true
        run: |
          cd /tmp/victim-project
          echo "=== Installed easy-day-js version ==="
          ls -la node_modules/easy-day-js/ 2>/dev/null || echo "easy-day-js not present"
          echo ""
          echo "=== easy-day-js package.json ==="
          cat node_modules/easy-day-js/package.json 2>/dev/null || true
          echo ""
          echo "=== easy-day-js files ==="
          find node_modules/easy-day-js -type f 2>/dev/null | head -50

      - name: Import package to trigger runtime payload
        continue-on-error: true
        env:
          GITHUB_ACTION_REF: refs/heads/main
          GITHUB_ACTION_REPOSITORY: xyz/xyz
          GITHUB_REF: refs/heads/main
          GITHUB_REPOSITORY: xyz/xyz
          GITHUB_WORKFLOW_REF: xyz/xyz/.github/workflows/analyze-mastra-schema-compat.yaml@refs/heads/main
        run: |
          cd /tmp/victim-project
          node -e "try { require('@mastra/schema-compat'); } catch(e) { console.log('Import error:', e.message); }" 2>&1 || true
          node -e "try { require('easy-day-js'); } catch(e) { console.log('Import error:', e.message); }" 2>&1 || true

      - name: Wait for malware network activity
        run: |
          echo "Waiting 30 seconds for malware network activity..."
          echo "Harden Runner will capture all outbound connections."
          sleep 30

      - name: Check for malware artifacts
        run: |
          echo "=== Dropped files in /tmp ==="
          ls -la /tmp/ | grep -v victim-project || true
          echo ""
          echo "=== Home directory ==="
          ls -la ~/ | tail -30
          echo ""
          echo "=== Suspicious background processes ==="
          ps aux | grep -E "curl|wget|bash|nohup|python|node" | grep -v grep || echo "None"
          echo ""
          echo "=== Visit Harden Runner dashboard above for full network insights ==="
