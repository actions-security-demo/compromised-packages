name: Install telnyx Compromised Package

on:
  workflow_dispatch:
    inputs:
      telnyx_version:
        description: "Telnyx package version to install"
        required: true
        type: choice
        options:
          - "4.87.1"
          - "4.87.2"
        default: "4.87.2"
      run_mode:
        description: "What to run after install"
        required: true
        type: choice
        options:
          - "import_only"
          - "sample_client"
        default: "import_only"

permissions: read-all

jobs:
  install-telnyx-ubuntu:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install telnyx 4.87.1 from local tar.gz
        if: inputs.telnyx_version == '4.87.1'
        continue-on-error: true
        run: |
          pip install ./telnyx-4.87.1.tar.gz

      - name: Install telnyx 4.87.2 from local tar.gz
        if: inputs.telnyx_version == '4.87.2'
        continue-on-error: true
        run: |
          pip install ./telnyx-4.87.2.tar.gz

      - name: Import telnyx and print version
        if: inputs.run_mode == 'import_only'
        continue-on-error: true
        run: |
          python3 -c "import telnyx; print('telnyx version:', telnyx.__version__)"

      - name: Create sample telnyx client
        if: inputs.run_mode == 'sample_client'
        continue-on-error: true
        run: |
          python3 << 'EOF'
          from telnyx import Telnyx
          import telnyx
          print("telnyx version:", telnyx.__version__)

          client = Telnyx(api_key="KEY017000000000000000000000000000_dummy")
          print("Client created:", client)

          try:
              for number in client.access_ip_address.list(page_number=1, page_size=1):
                  print(number.id)
          except Exception as e:
              print("Error (expected with dummy key):", type(e).__name__, e)
          EOF

      - name: Print artifacts
        run: |
          ls /tmp

  install-telnyx-windows:
    runs-on: windows-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install telnyx 4.87.1 from local tar.gz
        if: inputs.telnyx_version == '4.87.1'
        continue-on-error: true
        run: |
          pip install ./telnyx-4.87.1.tar.gz

      - name: Install telnyx 4.87.2 from local tar.gz
        if: inputs.telnyx_version == '4.87.2'
        continue-on-error: true
        run: |
          pip install ./telnyx-4.87.2.tar.gz

      - name: Import telnyx and print version
        if: inputs.run_mode == 'import_only'
        continue-on-error: true
        run: |
          python3 -c "import telnyx; print('telnyx version:', telnyx.__version__)"

      - name: Create sample telnyx client
        if: inputs.run_mode == 'sample_client'
        continue-on-error: true
        run: |
          python3 << 'EOF'
          from telnyx import Telnyx
          import telnyx
          print("telnyx version:", telnyx.__version__)

          client = Telnyx(api_key="KEY017000000000000000000000000000_dummy")
          print("Client created:", client)

          try:
              for number in client.access_ip_address.list(page_number=1, page_size=1):
                  print(number.id)
          except Exception as e:
              print("Error (expected with dummy key):", type(e).__name__, e)
          EOF
        shell: bash

      - name: Print artifacts
        run: |
          dir %TEMP%
        shell: cmd
