name: Install pyfdb

on:
  workflow_dispatch:

jobs:
  install-wheel:
    runs-on: ubuntu-24.04

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Show Python info
        run: |
          python --version
          python -m pip --version

      - name: Install local wheel
        run: |
          python -m pip install ./pyfdb-5.21.0.16-cp314-cp314-manylinux_2_28_x86_64.whl

      - name: Run under strace (follow children)
        run: |
          strace -f python - <<'PY'
          import pyfdb
          import shutil

          print("pyfdb imported successfully")
          print(getattr(pyfdb, "__version__", "version attribute not found"))

          fdb = pyfdb.FDB()
          PY
