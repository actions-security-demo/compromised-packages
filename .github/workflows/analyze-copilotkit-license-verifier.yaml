name: Analyze @copilotkit/license-verifier v0.4.0 Compromised Package

on:
  workflow_dispatch:

permissions: read-all

jobs:
  download-package:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download compromised package tarball from npm
        run: |
          npm pack @copilotkit/license-verifier@0.4.0 2>&1 || true
          ls -la *.tgz || true

      - name: Upload package tarball
        uses: actions/upload-artifact@v4
        with:
          name: copilotkit-license-verifier-tarball
          path: "*.tgz"
          retention-days: 90

  install-compromised-package:
    runs-on: ubuntu-latest
    needs: download-package
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install compromised @copilotkit/license-verifier v0.4.0
        continue-on-error: true
        run: |
          mkdir -p /tmp/victim-project && cd /tmp/victim-project
          npm init -y
          npm install @copilotkit/license-verifier@0.4.0 2>&1 || true

      - name: Inspect package contents
        continue-on-error: true
        run: |
          echo "=== Package files ==="
          find /tmp/victim-project/node_modules/@copilotkit/license-verifier -type f | sort || true
          echo ""
          echo "=== package.json ==="
          cat /tmp/victim-project/node_modules/@copilotkit/license-verifier/package.json 2>/dev/null || true
          echo ""
          echo "=== main/index file ==="
          cat /tmp/victim-project/node_modules/@copilotkit/license-verifier/dist/index.js 2>/dev/null \
            || cat /tmp/victim-project/node_modules/@copilotkit/license-verifier/index.js 2>/dev/null \
            || true

      - name: Require package to trigger runtime payload
        continue-on-error: true
        run: |
          cd /tmp/victim-project
          node -e "require('@copilotkit/license-verifier'); console.log('require complete');" 2>&1 || true

      - name: Wait for malware network activity
        run: |
          echo "Waiting 30 seconds for malware network activity..."
          echo "Harden Runner will capture all outbound connections."
          sleep 30

      - name: Check for malware artifacts
        run: |
          echo "=== Dropped files in /tmp ==="
          ls -la /tmp/ | grep -v victim-project || true
          echo ""
          echo "=== Home directory ==="
          ls -la ~/ | tail -30
          echo ""
          echo "=== Suspicious background processes ==="
          ps aux | grep -E "curl|wget|bash|nohup|python|node" | grep -v grep || echo "None"
          echo ""
          echo "=== Environment variables (redacted secrets) ==="
          env | grep -v -E "TOKEN|SECRET|KEY|PASSWORD|CREDENTIAL" | sort || true
          echo ""
          echo "=== postinstall script (if any) ==="
          cat /tmp/victim-project/node_modules/@copilotkit/license-verifier/package.json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('scripts',{}))" 2>/dev/null || true
