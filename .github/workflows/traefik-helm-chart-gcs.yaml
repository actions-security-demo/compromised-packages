name: Analyze Compromised Traefik Helm Chart (GCS)

on:
  workflow_dispatch:

permissions: read-all

jobs:
  download-chart:
    name: Download and inspect compromised chart
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Download compromised chart directly from GCS
        run: |
          mkdir -p /tmp/charts

          echo "=== Attempting to download traefik chart tarball directly from GCS ==="
          echo "Issue reports chart version 39.0.7 with traefik 3.6.11"
          echo ""

          # Try downloading the chart tarball directly
          # The old GCS repo hosts tarballs at /kubernetes-charts/<name>-<version>.tgz
          for version in 39.0.7 39.0.6 39.0.5; do
            echo "--- Trying traefik-${version}.tgz ---"
            HTTP_CODE=$(curl -sL -w "%{http_code}" -o /tmp/charts/traefik-${version}.tgz \
              "https://storage.googleapis.com/kubernetes-charts/traefik-${version}.tgz")
            echo "HTTP status: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "SUCCESS: Downloaded traefik-${version}.tgz"
              ls -la /tmp/charts/traefik-${version}.tgz
              break
            else
              rm -f /tmp/charts/traefik-${version}.tgz
            fi
          done

          # Also try the helm repo add with force-update in case it works with a retry
          echo ""
          echo "=== Trying helm repo add (may fail with 403) ==="
          helm repo add kubernetes-charts https://storage.googleapis.com/kubernetes-charts --force-update 2>&1 || true
          helm repo update 2>&1 || true
          helm pull kubernetes-charts/traefik --destination /tmp/charts --untar 2>&1 || true

          echo ""
          echo "=== Contents of /tmp/charts ==="
          ls -la /tmp/charts/ || echo "Directory empty"

      - name: Extract and inspect chart
        continue-on-error: true
        run: |
          cd /tmp/charts

          echo "=== Extracting any downloaded tarballs ==="
          for tgz in *.tgz; do
            if [ -f "$tgz" ]; then
              echo "Extracting $tgz..."
              tar xzf "$tgz" 2>&1 || echo "Failed to extract $tgz"
            fi
          done

          echo ""
          echo "=== All extracted files ==="
          find /tmp/charts -type f | sort

          echo ""
          echo "=== Looking for templates/helm-config.yaml ==="
          HELM_CONFIG=$(find /tmp/charts -name "helm-config.yaml" -type f 2>/dev/null)
          if [ -n "$HELM_CONFIG" ]; then
            echo "FOUND: $HELM_CONFIG"
            echo ""
            echo "=== Raw file contents ==="
            cat "$HELM_CONFIG"
            echo ""
            echo "=== Attempting to decode base64 payload ==="
            grep -oP '[A-Za-z0-9+/=]{100,}' "$HELM_CONFIG" | while read -r encoded; do
              echo "--- Decoded payload ---"
              echo "$encoded" | base64 -d 2>/dev/null || echo "(decode failed)"
              echo "--- End decoded payload ---"
            done
          else
            echo "helm-config.yaml NOT found"
            echo ""
            echo "=== Listing all template files ==="
            find /tmp/charts -path "*/templates/*" -type f | sort || echo "No templates found"
          fi

      - name: Compare with official GitHub source
        continue-on-error: true
        run: |
          echo "=== Pulling chart from official GitHub source for comparison ==="
          helm repo add traefik-github https://traefik.github.io/charts
          helm repo update
          mkdir -p /tmp/charts-github
          helm pull traefik-github/traefik --version 39.0.7 --destination /tmp/charts-github --untar 2>&1 || true

          echo ""
          echo "=== Official chart files ==="
          find /tmp/charts-github -type f | sort

          echo ""
          echo "=== Checking if helm-config.yaml exists in official chart ==="
          find /tmp/charts-github -name "helm-config.yaml" -type f || echo "NOT present in official chart (confirming injection)"

      - name: Upload chart artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traefik-helm-chart-gcs-compromised
          path: /tmp/charts/
          retention-days: 90
          if-no-files-found: warn

      - name: Upload clean chart for comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traefik-helm-chart-github-clean
          path: /tmp/charts-github/
          retention-days: 90
          if-no-files-found: warn

  template-compromised-chart:
    name: Render compromised chart to trigger payload
    runs-on: ubuntu-latest
    needs: download-chart
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Download compromised chart
        continue-on-error: true
        run: |
          mkdir -p /tmp/charts
          for version in 39.0.7 39.0.6 39.0.5; do
            HTTP_CODE=$(curl -sL -w "%{http_code}" -o /tmp/charts/traefik-${version}.tgz \
              "https://storage.googleapis.com/kubernetes-charts/traefik-${version}.tgz")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Downloaded traefik-${version}.tgz"
              tar xzf /tmp/charts/traefik-${version}.tgz -C /tmp/charts
              break
            else
              rm -f /tmp/charts/traefik-${version}.tgz
            fi
          done

          # Fallback: try helm repo
          if [ ! -d /tmp/charts/traefik ]; then
            helm repo add kubernetes-charts https://storage.googleapis.com/kubernetes-charts --force-update 2>&1 || true
            helm repo update 2>&1 || true
            helm pull kubernetes-charts/traefik --destination /tmp/charts --untar 2>&1 || true
          fi

      - name: Render chart with helm template
        continue-on-error: true
        run: |
          echo "=== Running helm template to trigger any embedded payloads ==="
          if [ -d /tmp/charts/traefik ]; then
            helm template traefik-test /tmp/charts/traefik 2>&1 || true
          else
            echo "Chart directory not found, skipping template render"
          fi

      - name: Wait for malware network activity
        run: |
          echo "Waiting 60 seconds for any network exfiltration activity..."
          echo "Harden Runner will capture all outbound connections."
          echo "Expected exfiltration target: rspds.de/report"
          sleep 60

      - name: Check for exfiltration artifacts
        run: |
          echo "=== Check running background processes ==="
          ps aux | grep -E "curl|wget|bash|nohup|base64" | grep -v grep || echo "No suspicious processes found"
          echo ""
          echo "=== Check /tmp for dropped files ==="
          ls -la /tmp/ | grep -v charts || true
          echo ""
          echo "=== Check for DNS lookups to rspds.de ==="
          cat /var/log/syslog 2>/dev/null | grep -i rspds || echo "No syslog entries for rspds.de"
          echo ""
          echo "=== Check Harden Runner insights for all network connections ==="
          echo "Visit the Harden Runner dashboard link above to see:"
          echo "  - All outbound network connections (especially to rspds.de)"
          echo "  - DNS resolution attempts"
          echo "  - Process tree showing payload execution"
          echo "  - Any data sent to http://rspds.de/report"
