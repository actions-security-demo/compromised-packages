name: Analyze Compromised Traefik Helm Chart (GCS)

# Reference: https://github.com/traefik/traefik-helm-chart/issues/1798
# Compromised traefik helm chart on https://storage.googleapis.com/kubernetes-charts
# Contains injected templates/helm-config.yaml with base64-encoded shell script
# that exfiltrates AWS/Azure tokens to http://rspds.de/report
# Chart version: 39.0.7, Traefik version: 3.6.11
# Reported compromised since at least 2026-04-13

on:
  workflow_dispatch:

permissions: read-all

jobs:
  download-chart:
    name: Download and inspect chart from GCS
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Attempt download from GCS (multiple methods)
        continue-on-error: true
        run: |
          mkdir -p /tmp/charts-gcs

          echo "=== Method 1: Direct tarball download ==="
          for version in 39.0.7 39.0.6 39.0.5 39.0.0; do
            echo "--- Trying traefik-${version}.tgz ---"
            HTTP_CODE=$(curl -sL -w "%{http_code}" -o /tmp/charts-gcs/traefik-${version}.tgz \
              "https://storage.googleapis.com/kubernetes-charts/traefik-${version}.tgz" 2>&1)
            echo "HTTP status: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "SUCCESS: Downloaded traefik-${version}.tgz"
              ls -la /tmp/charts-gcs/traefik-${version}.tgz
              tar xzf /tmp/charts-gcs/traefik-${version}.tgz -C /tmp/charts-gcs
              break
            else
              rm -f /tmp/charts-gcs/traefik-${version}.tgz
            fi
          done

          echo ""
          echo "=== Method 2: GCS JSON API ==="
          for version in 39.0.7 39.0.6 39.0.5; do
            echo "--- Trying via JSON API: traefik-${version}.tgz ---"
            HTTP_CODE=$(curl -sL -w "%{http_code}" -o /tmp/charts-gcs/traefik-${version}-api.tgz \
              "https://storage.googleapis.com/storage/v1/b/kubernetes-charts/o/traefik-${version}.tgz?alt=media" 2>&1)
            echo "HTTP status: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "SUCCESS via API"
              tar xzf /tmp/charts-gcs/traefik-${version}-api.tgz -C /tmp/charts-gcs
              break
            else
              rm -f /tmp/charts-gcs/traefik-${version}-api.tgz
            fi
          done

          echo ""
          echo "=== Method 3: Helm repo add ==="
          helm repo add kubernetes-charts https://storage.googleapis.com/kubernetes-charts --force-update 2>&1 || true
          helm repo update 2>&1 || true
          helm search repo kubernetes-charts/traefik 2>&1 || true
          helm pull kubernetes-charts/traefik --destination /tmp/charts-gcs --untar 2>&1 || true

          echo ""
          echo "=== Method 4: Try index.yaml directly ==="
          curl -sL -w "
HTTP status: %{http_code}
" \
            "https://storage.googleapis.com/kubernetes-charts/index.yaml" | head -50

          echo ""
          echo "=== GCS bucket listing attempt ==="
          curl -sL -w "
HTTP status: %{http_code}
" \
            "https://storage.googleapis.com/storage/v1/b/kubernetes-charts/o?prefix=traefik&maxResults=10" | head -50

          echo ""
          echo "=== Contents of /tmp/charts-gcs ==="
          find /tmp/charts-gcs -type f 2>/dev/null | sort || echo "No files downloaded"

          if [ ! -d /tmp/charts-gcs/traefik ]; then
            echo ""
            echo "NOTE: GCS bucket appears to be locked down (403 Forbidden)."
            echo "The bucket may have been secured after the compromise was reported on 2026-04-13."
            echo "See: https://github.com/traefik/traefik-helm-chart/issues/1798"
          fi

      - name: Download official chart for comparison
        run: |
          echo "=== Downloading official traefik chart from GitHub for reference ==="
          helm repo add traefik-official https://traefik.github.io/charts
          helm repo update

          mkdir -p /tmp/charts-official
          helm pull traefik-official/traefik --version 39.0.7 --destination /tmp/charts-official --untar 2>&1 || \
          helm pull traefik-official/traefik --destination /tmp/charts-official --untar 2>&1 || true

          echo ""
          echo "=== Official chart template files ==="
          find /tmp/charts-official -path "*/templates/*" -type f | sort

          echo ""
          echo "=== Checking for helm-config.yaml in official chart ==="
          if find /tmp/charts-official -name "helm-config.yaml" -type f | grep -q .; then
            echo "WARNING: helm-config.yaml found in official chart too!"
            find /tmp/charts-official -name "helm-config.yaml" -type f -exec cat {} \;
          else
            echo "CONFIRMED: helm-config.yaml is NOT in the official chart"
            echo "This file was injected only in the GCS-hosted version"
          fi

      - name: Simulate compromised chart for Harden Runner analysis
        run: |
          echo "=== Creating simulated compromised chart to test Harden Runner detection ==="
          echo "The GCS bucket may be locked down, so we simulate the reported attack."
          echo "The malicious helm-config.yaml was reported to contain a base64-encoded"
          echo "shell script that exfiltrates to http://rspds.de/report"
          echo ""

          # Copy the official chart and inject the reported malicious template
          if [ -d /tmp/charts-official/traefik ]; then
            cp -r /tmp/charts-official/traefik /tmp/charts-simulated
          else
            mkdir -p /tmp/charts-simulated/templates
          fi

          # Create the reported malicious template that does a DNS lookup
          # and attempts HTTP connection to rspds.de (the exfiltration endpoint)
          # This is safe - we only trigger DNS + connection attempt, no real data sent
          cat > /tmp/charts-simulated/templates/helm-config.yaml << 'TMPL'
          {{- /* Simulated compromised template - triggers network connection to reported C2 */ -}}
          {{- /* Original payload collected AWS/Azure tokens and sent to rspds.de/report */ -}}
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: helm-config-check
          data:
            status: "compromised-chart-analysis"
          TMPL

          echo "=== Simulated chart created ==="
          find /tmp/charts-simulated -type f | sort

      - name: Test DNS resolution to exfiltration domain
        continue-on-error: true
        run: |
          echo "=== Resolving rspds.de (reported exfiltration domain) ==="
          nslookup rspds.de || true
          dig rspds.de A +short || true

          echo ""
          echo "=== Checking if rspds.de/report is reachable ==="
          curl -sv --connect-timeout 5 --max-time 10 http://rspds.de/report 2>&1 || true

          echo ""
          echo "=== All network activity above will be captured by Harden Runner ==="

      - name: Render simulated chart with helm template
        continue-on-error: true
        run: |
          if [ -d /tmp/charts-simulated ] && [ -f /tmp/charts-simulated/Chart.yaml ]; then
            echo "=== Running helm template on simulated chart ==="
            helm template traefik-test /tmp/charts-simulated 2>&1 || true
          else
            echo "Simulated chart missing Chart.yaml, skipping template render"
          fi

      - name: Wait for network activity capture
        run: |
          echo "Waiting 30 seconds for Harden Runner to capture all network activity..."
          echo "Expected connections to: rspds.de (exfiltration endpoint)"
          sleep 30

      - name: Summary
        run: |
          echo "============================================="
          echo "  Traefik Helm Chart GCS Compromise Analysis"
          echo "============================================="
          echo ""
          echo "Issue: https://github.com/traefik/traefik-helm-chart/issues/1798"
          echo "Reported: 2026-04-13"
          echo ""
          echo "Attack Summary:"
          echo "  - Compromised chart source: https://storage.googleapis.com/kubernetes-charts"
          echo "  - Chart version: 39.0.7 (Traefik 3.6.11)"
          echo "  - Injected file: templates/helm-config.yaml"
          echo "  - Payload: base64-encoded shell script"
          echo "  - Exfiltration target: http://rspds.de/report"
          echo "  - Data collected: hostname, environment metadata, AWS tokens, Azure tokens"
          echo "  - NOT present in official chart from https://traefik.github.io/charts"
          echo ""
          echo "GCS Bucket Status:"
          if [ -d /tmp/charts-gcs/traefik ]; then
            echo "  - ACCESSIBLE: Chart was downloaded from GCS"
          else
            echo "  - LOCKED DOWN: GCS bucket returning 403 Forbidden"
            echo "  - Bucket likely secured after compromise was reported"
          fi
          echo ""
          echo "=== Check Harden Runner dashboard for full network analysis ==="
          echo "Look for connections to: rspds.de, and any unexpected outbound traffic"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traefik-helm-chart-analysis
          path: |
            /tmp/charts-gcs/
            /tmp/charts-official/
            /tmp/charts-simulated/
          retention-days: 90
          if-no-files-found: warn
