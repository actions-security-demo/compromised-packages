name: Analyze Malicious Checkout Commit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Run malicious checkout commit
        uses: actions/checkout@70379aad1a8b40919ce8b382d3cd7d0315cde1d0

