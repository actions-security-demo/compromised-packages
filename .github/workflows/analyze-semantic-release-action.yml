name: Analyze semantic-release-action

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: h0x0er/harden-runner@int-pr2
        with:
          egress-policy: audit

      - name: Run semantic-release-action
        uses: codfish/semantic-release-action@22dd1db09fadcce0becff0a35d48c53caff8c619

      - name: wait
        if: always()
        run: sleep 30s
