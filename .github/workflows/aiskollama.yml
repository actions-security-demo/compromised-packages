name: 🧪 Detonate ai-sdk-ollama (Controlled Sandbox)

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: 'Compromised version to detonate (0.13.1 / 1.1.1 / 2.2.1 / 3.8.5)'
        required: false
        default: '0.13.1'

# Intentionally read-only — blocks worm from writing injected workflow files
permissions:
  contents: read

env:
  BUN_CONFIG_VERBOSE_FETCH: true

jobs:
  detonate:
    name: Detonate ai-sdk-ollama@${{ github.event.inputs.package_version || '0.13.1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Real-format values that bypass TW() killswitch checks
      # TW() exits if AWS_ACCESS_KEY_ID starts with 'AKIAFAKE' — ours starts with 'AKIAIOSFODNN7'
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      AWS_DEFAULT_REGION: us-east-1
      # TW() exits if NPM_TOKEN starts with 'npm_F4k3NPMToken' — ours does not
      NPM_TOKEN: npm_sandbox_detonation_0000000000000000
      # TW() exits if ANTHROPIC_API_KEY starts with 'sk-ant-api03-fake' — ours does not
      ANTHROPIC_API_KEY: sk-ant-api03-sandbox000000000000000000
      # Do NOT set GITHUB_TOKEN — Actions injects ghs_ token automatically (not ghp_ prefix)
      # Do NOT set CIRCLE_TOKEN with 'fake_circle' prefix

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: false

      - run: ps aux

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install native build tools (required for binding.gyp execution)
        run: sudo apt-get install -y python3 make g++ strace --quiet

      - name: Install ai-sdk-ollama (binding.gyp fires during install)
        run: |
          VERSION="${{ github.event.inputs.package_version || '0.13.1' }}"
          echo "[*] Installing ai-sdk-ollama@${VERSION}"
          echo "[*] binding.gyp triggers node-gyp -> executes index.js payload"
          mkdir -p /tmp/sdk-test && cd /tmp/sdk-test
          npm init -y

          # Background process monitor — captures full process tree every 2s during install
          (
            while true; do
              echo "=== ps snapshot $(date +%T) ==="
              ps aux --forest || true
              sleep 2
            done
          ) &
          MONITOR_PID=$!

          npm install "ai-sdk-ollama@${VERSION}" --no-save --ignore-scripts=false 2>&1 || true
          echo "[*] Install step complete"

          kill $MONITOR_PID 2>/dev/null || true

      - name: Capture post-install artifacts
        if: always()
        run: |
          echo "=== Final process tree ==="
          ps aux --forest || true
          echo "=== Network connections ==="
          ss -tunap || true
