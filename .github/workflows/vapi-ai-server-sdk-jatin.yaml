name: Analyze Vapi AI Server SDK 1.2.2 Jatin

on:
  workflow_dispatch:

permissions: read-all

jobs:
  analyze-vapi-ai-server-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2.17.0
        with:
          egress-policy: audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install @vapi-ai/server-sdk 1.2.2
        continue-on-error: true
        run: |
          mkdir -p /tmp/victim-project && cd /tmp/victim-project
          npm init -y
          npm install @vapi-ai/server-sdk@1.2.2

      - name: Verify package install and version
        continue-on-error: true
        run: |
          cd /tmp/victim-project
          node -e "const pkg = require('./node_modules/@vapi-ai/server-sdk/package.json'); console.log('@vapi-ai/server-sdk version:', pkg.version);"
          npm view @vapi-ai/server-sdk@1.2.2 dist.shasum

      - name: Run index.js with Bun
        continue-on-error: true
        env:
          BUN_CONFIG_VERBOSE_FETCH: true
        run: |
          cd /tmp/victim-project
          GITHUB_REPOSITORY=xyz/xyz bun ./node_modules/@vapi-ai/server-sdk/index.js
