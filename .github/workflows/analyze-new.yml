name: Analyze Suspicious Packages with HardenRunner

on:
  workflow_dispatch:

permissions: read-all

env:
  GITHUB_REPOSITORY: xyz/xyz

jobs:
  analyze-ppkt2synergy:
    runs-on: ubuntu-latest
    steps:
      - name: Harden GitHub Actions
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download ppkt2synergy 0.1.1
        run: |
          mkdir -p /tmp/packages
          curl -fL -o /tmp/packages/ppkt2synergy-0.1.1-py3-none-any.whl \
            https://files.pythonhosted.org/packages/fa/a2/fe059119c07fca569cc874e00291af868654ecffa4fd1cbdbf0590f1c0a7/ppkt2synergy-0.1.1-py3-none-any.whl
          sha256sum /tmp/packages/ppkt2synergy* || true

      - name: Install and analyze ppkt2synergy
        continue-on-error: true
        env:
          BUN_CONFIG_VERBOSE_FETCH: "true"
        run: |
          # phenopacket-store-toolkit<0.2,>=0.1.4 does not exist on PyPI (supply-chain red flag)
          # Pre-install all available deps, then install the whl itself with --no-deps
          python -m pip install \
            "hpo-toolkit>=0.5.0,<0.6" \
            "phenopackets>=2.0.2,<3.0" \
            "gpsea" \
            "joblib" \
            "numpy" \
            "pandas" \
            "plotly" \
            "scikit-learn" \
            "scipy" \
            "statsmodels" \
            "tqdm" || true
          python -m pip install --no-deps /tmp/packages/ppkt2synergy-0.1.1-py3-none-any.whl
          python -m pip show ppkt2synergy || true

          PKG_DIR=$(python -c "import ppkt2synergy, os; print(os.path.dirname(ppkt2synergy.__file__))" 2>/dev/null || echo "")
          
          if [ -z "$PKG_DIR" ]; then
            PKG_DIR=$(python -m pip show -f ppkt2synergy 2>/dev/null | grep "^Location:" | awk '{print $2}')/ppkt2synergy || PKG_DIR=""
          fi

          if [ -n "$PKG_DIR" ] && [ -d "$PKG_DIR" ]; then
            echo "Package directory: $PKG_DIR"
            find "$PKG_DIR" -name "*.py" -o -name "*.js" -o -name "*.sh" | head -20
            
            strace -f -e trace=network,execve,openat,open -o /tmp/ppkt2synergy-strace.log \
              python -c "import ppkt2synergy; print(dir(ppkt2synergy))" 2>&1 || true
          fi

      - name: Check ppkt2synergy for artifacts
        continue-on-error: true
        run: |
          echo "=== Strace network/exec activity ==="
          grep -E "connect|execve|socket" /tmp/ppkt2synergy-strace.log 2>/dev/null | head -20 || echo "None detected"
          
          echo "=== /tmp directory contents ==="
          ls -la /tmp/ | grep -E "ppkt2|bun|node" || true

      - name: Wait for payload execution
        run: sleep 120

      - name: Upload ppkt2synergy logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ppkt2synergy-analysis
          path: /tmp/ppkt2synergy-strace.log
          retention-days: 30

