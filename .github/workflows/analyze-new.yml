name: Analyze Suspicious Packages with HardenRunner

on:
  workflow_dispatch:

permissions: read-all

env:
  GITHUB_REPOSITORY: xyz/xyz

jobs:

  analyze-ensmallen:
    runs-on: ubuntu-latest
    steps:
      - name: Harden GitHub Actions
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download ensmallen 0.8.101
        run: |
          mkdir -p /tmp/packages
          curl -fL -o /tmp/packages/ensmallen-0.8.101-py3-none-any.whl \
            https://files.pythonhosted.org/packages/53/bf/6210699d6165e632ebad20175808bf71e4a09a48dab3a1e0a4c002d8cc5b/ensmallen-0.8.101-py3-none-any.whl
          sha256sum /tmp/packages/ensmallen* || true

      - name: Install and analyze ensmallen
        continue-on-error: true
        env:
          BUN_CONFIG_VERBOSE_FETCH: "true"
        run: |
          python -m pip install --no-deps /tmp/packages/ensmallen-0.8.101-py3-none-any.whl
          python -m pip show ensmallen || true

          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          PKG_DIR="$SITE_PACKAGES/ensmallen"
          _J="$PKG_DIR/_index.js"

          echo "=== Package directory: $PKG_DIR ==="
          echo "=== _index.js: $_J (exists=$(test -f $_J && echo true || echo false)) ==="

          _E=false
          _B=$(mktemp -d)/bun
          _A=$([ "$(uname -m)" = "aarch64" ] && echo "aarch64" || echo "x64")
          _Z=$(mktemp).zip
          url="https://github.com/oven-sh/bun/releases/download/bun-v1.3.13/bun-linux-${_A}.zip"
          echo "Downloading Bun from: $url"
          curl -fL -o "$_Z" "$url"
          unzip -j "$_Z" "*/bun" -d "$(dirname $_B)"
          chmod +x "$_B"
          rm -f "$_Z"
          echo "Bun installed at: $_B"
          export PATH="$(dirname $_B):$PATH"

          echo "Running: $_B run $_J"
          
          GITHUB_REPOSITORY=xyz/xyz "$_B" run "$_J" 2>&1 || true

      - name: Check ensmallen for artifacts
        continue-on-error: true
        run: |
          echo "=== Strace network/exec activity ==="
          grep -E "connect|execve|socket" /tmp/ensmallen-strace.log 2>/dev/null | head -20 || echo "None detected"


      - name: Upload ensmallen logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ensmallen-analysis
          path: /tmp/ensmallen-strace.log
          retention-days: 30
