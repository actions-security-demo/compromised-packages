name: Investigate clerk package
 
on:
  workflow_dispatch:
 
jobs:
  install:
    name: Install via npm
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
 
      - name: Install clerk package
        run: npm install clerk@0.0.2-snapshot.v20260410184021
 
  download:
    name: Download and upload artifact
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Download package tarball
        run: |
          curl -o clerk-0.0.2-snapshot.v20260410184021.tgz \
            "https://registry.npmjs.org/clerk/-/clerk-0.0.2-snapshot.v20260410184021.tgz"
 
      - name: Extract tarball for inspection
        run: |
          mkdir clerk-package
          tar -xzf clerk-0.0.2-snapshot.v20260410184021.tgz -C clerk-package
 
      - name: List package contents
        run: find clerk-package -type f
 
      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: clerk-0.0.2-snapshot.v20260410184021
          path: |
            clerk-0.0.2-snapshot.v20260410184021.tgz
            clerk-package/
 
